<!DOCTYPE html>

<title>⚡ Radar Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="overlay"></div>

<div class="dashboard">

    <div class="radar">

      <div class="centro"></div>

    <!-- Barra -->
    <div class="barra">
      <div id="nivel"></div>
    </div>

    <!-- Carro -->
    <div class="pista">
      <div id="carro">🚗</div>
    </div>

    <!-- Gráfica -->
    <canvas id="grafica"></canvas>

  </div>

</div>

<script src="script.js"></script>

</html>
